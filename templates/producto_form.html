{% extends 'base.html' %}

{% block content %}
<h1>{{ accion }} producto</h1>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Código</label>
    <input type="text" name="codigo" class="form-control" value="{{ producto.codigo if producto else '' }}" {% if producto %}readonly{% endif %} required>
  </div>
  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre if producto else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Categoría</label>
    <input type="text" name="categoria" class="form-control" value="{{ producto.categoria if producto else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Precio</label>
    <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio if producto else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Stock</label>
    <input type="number" name="stock" class="form-control" value="{{ producto.stock if producto else '' }}" required>
  </div>
  <button type="submit" class="btn btn-primary">Guardar</button>
  <a href="{{ url_for('inicio') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
